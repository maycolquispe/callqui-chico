<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Certificado | Comunidad Campesina Callqui Chico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c9a45c;
            --primary-dark: #a68442;
            --dark-bg: #0a1928;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0a1928 0%, #112240 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .verify-card {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            margin-bottom: 1rem;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 1rem 1rem 1rem 50px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(201, 164, 92, 0.1);
            outline: none;
        }

        .search-box .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1.2rem;
        }

        .btn-verificar {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            padding: 1rem 2rem;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .btn-verificar:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(201, 164, 92, 0.4);
        }

        .btn-verificar:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .result-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            display: none;
        }

        .result-card.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .status-valid {
            background: #dcfce7;
            color: #166534;
        }

        .status-invalid {
            background: #fee2e2;
            color: #991b1b;
        }

        .info-row {
            display: flex;
            padding: 0.75rem 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #64748b;
            font-weight: 500;
            min-width: 140px;
        }

        .info-value {
            color: #1e293b;
            font-weight: 600;
        }

        .hash-box {
            background: #1e293b;
            color: #94a3b8;
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            word-break: break-all;
            margin-top: 0.5rem;
        }

        .integrity-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
        }

        .integrity-ok {
            background: #dcfce7;
            color: #166534;
        }

        .integrity-error {
            background: #fee2e2;
            color: #991b1b;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            color: #64748b;
            font-size: 0.85rem;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="verify-card">
        <!-- Logo y título -->
        <div class="text-center mb-4">
            <img src="assets/img/logo_callqui.jpg" class="logo-img" alt="Logo Callqui Chico">
            <h2 class="fw-bold text-dark mb-1">Verificar Certificado</h2>
            <p class="text-muted">Comunidad Campesina de Callqui Chico</p>
        </div>

        <!-- Buscador -->
        <div class="search-box mb-4">
            <i class="bi bi-search search-icon"></i>
            <input type="text" 
                   class="form-control" 
                   id="codigoInput" 
                   placeholder="Ingrese código (ej: ADJ-2026-0001)"
                   maxlength="20">
        </div>

        <button class="btn btn-verificar w-100" onclick="verificarCertificado()" id="btnVerificar">
            <i class="bi bi-shield-check me-2"></i>
            Verificar Autenticidad
        </button>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner mx-auto mb-3"></div>
            <p class="text-muted">Verificando certificado...</p>
        </div>

        <!-- Resultado -->
        <div class="result-card" id="resultado">
            <!-- Estado general -->
            <div class="d-flex align-items-center justify-content-between mb-3">
                <h5 class="fw-bold mb-0">
                    <i class="bi bi-patch-check me-2"></i>
                    Resultado de Verificación
                </h5>
                <span class="status-badge" id="statusBadge"></span>
            </div>

            <!-- Información del certificado -->
            <div id="infoCertificado"></div>

            <!-- Verificación de integridad -->
            <div class="mt-3 pt-3 border-top" id="integridadSection">
                <h6 class="fw-bold mb-2">
                    <i class="bi bi-fingerprint me-2"></i>
                    Verificación de Integridad
                </h6>
                <div id="integridadResult"></div>
            </div>

            <!-- Hash SHA-256 -->
            <div class="mt-3 pt-3 border-top" id="hashSection">
                <h6 class="fw-bold mb-2">
                    <i class="bi bi-hash me-2"></i>
                    Hash SHA-256
                </h6>
                <div class="hash-box" id="hashValue"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <i class="bi bi-tree-fill me-1" style="color: var(--primary);"></i>
            Sistema de Gestión de la Comunidad Campesina Callqui Chico<br>
            Resolución N° 138-2005/GOB.REG.HVCA/GRDE-DRA
        </div>
    </div>

    <script>
        async function verificarCertificado() {
            const codigo = document.getElementById('codigoInput').value.trim();
            
            if (!codigo) {
                alert('Por favor ingrese un código de certificado');
                return;
            }

            // Mostrar loading
            document.getElementById('loading').classList.add('show');
            document.getElementById('resultado').classList.remove('show');
            document.getElementById('btnVerificar').disabled = true;

            try {
                const response = await fetch(`verificar.php?codigo=${encodeURIComponent(codigo)}`);
                const data = await response.json();

                document.getElementById('loading').classList.remove('show');
                document.getElementById('btnVerificar').disabled = false;
                document.getElementById('resultado').classList.add('show');

                if (!data.success) {
                    // Certificado no encontrado
                    document.getElementById('statusBadge').className = 'status-badge status-invalid';
                    document.getElementById('statusBadge').innerHTML = '<i class="bi bi-x-circle me-1"></i>No válido';
                    document.getElementById('infoCertificado').innerHTML = `
                        <div class="alert alert-warning">
                            <i class="bi bi-exclamation-triangle me-2"></i>
                            ${data.message || 'Certificado no encontrado'}
                        </div>
                    `;
                    document.getElementById('integridadSection').style.display = 'none';
                    document.getElementById('hashSection').style.display = 'none';
                    return;
                }

                const cert = data.certificado;
                const verif = data.verificacion;

                // Estado del certificado
                const esValido = verif.integridad?.verificado === true;
                document.getElementById('statusBadge').className = `status-badge ${esValido ? 'status-valid' : 'status-invalid'}`;
                document.getElementById('statusBadge').innerHTML = esValido 
                    ? '<i class="bi bi-check-circle me-1"></i>Válido'
                    : '<i class="bi bi-x-circle me-1"></i>Verificar';

                // Información del certificado
                document.getElementById('infoCertificado').innerHTML = `
                    <div class="info-row">
                        <span class="info-label">Código:</span>
                        <span class="info-value">${cert.codigo}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Estado:</span>
                        <span class="info-value">${cert.estado}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Firmado:</span>
                        <span class="info-value">${cert.firmado_digitalmente ? 'Sí <i class="bi bi-patch-check-fill text-success"></i>' : 'No'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Titular:</span>
                        <span class="info-value">${cert.titular.nombre}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">DNI:</span>
                        <span class="info-value">${cert.titular.dni}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Lote:</span>
                        <span class="info-value">Sector ${cert.lote.sector} - MZ ${cert.lote.manzana} - LOTE ${cert.lote.lote} (${cert.lote.area_m2} m²)</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Fecha Generación:</span>
                        <span class="info-value">${cert.generacion.timestamp}</span>
                    </div>
                `;

                // Integridad
                if (verif.integridad) {
                    document.getElementById('integridadSection').style.display = 'block';
                    const integ = verif.integridad;
                    const integrityClass = integ.verificado ? 'integrity-ok' : 'integrity-error';
                    const integrityIcon = integ.verificado ? 'bi-check-circle' : 'bi-x-circle';
                    document.getElementById('integridadResult').innerHTML = `
                        <div class="integrity-badge ${integrityClass}">
                            <i class="bi ${integrityIcon}"></i>
                            ${integ.verificado ? 'Integridad verificada' : 'Alerta: El documento ha sido modificado'}
                        </div>
                        <p class="text-muted small mt-2 mb-0">
                            <i class="bi bi-file-earmark me-1"></i>
                            Archivo: ${integ.archivo || 'No disponible'}
                        </p>
                    `;
                }

                // Hash
                if (cert.generacion.hash_sha256) {
                    document.getElementById('hashSection').style.display = 'block';
                    document.getElementById('hashValue').textContent = cert.generacion.hash_sha256;
                } else {
                    document.getElementById('hashSection').style.display = 'none';
                }

            } catch (error) {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('btnVerificar').disabled = false;
                document.getElementById('resultado').classList.add('show');
                
                document.getElementById('statusBadge').className = 'status-badge status-invalid';
                document.getElementById('statusBadge').innerHTML = '<i class="bi bi-x-circle me-1"></i>Error';
                document.getElementById('infoCertificado').innerHTML = `
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        Error al verificar: ${error.message}
                    </div>
                `;
            }
        }

        // Permitir búsqueda con Enter
        document.getElementById('codigoInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verificarCertificado();
            }
        });
    </script>
</body>
</html>
